<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>EDIE Runner</title>
    <style>
        html, body, canvas {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0a0a;
            touch-action: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        canvas:focus { outline: none; }
        body { cursor: none; }
    </style>
</head>
<body oncontextmenu="return false;" onselectstart="return false;" ondragstart="return false;">
    <canvas id="glcanvas" tabindex="1"></canvas>
    <script>
      (function () {
        // Casual-scraper deterrent. Does not stop a determined reverser.
        document.addEventListener('contextmenu', function (e) { e.preventDefault(); }, true);
        document.addEventListener('selectstart', function (e) { e.preventDefault(); }, true);
        document.addEventListener('dragstart', function (e) { e.preventDefault(); }, true);
        document.addEventListener('copy', function (e) { e.preventDefault(); }, true);
        document.addEventListener('keydown', function (e) {
          // Block F12, Ctrl+Shift+I/J/C, Ctrl+U (view source), Ctrl+S (save page)
          var k = e.key || '';
          var K = k.toUpperCase();
          if (k === 'F12') { e.preventDefault(); return false; }
          if ((e.ctrlKey || e.metaKey) && e.shiftKey && (K === 'I' || K === 'J' || K === 'C')) {
            e.preventDefault(); return false;
          }
          if ((e.ctrlKey || e.metaKey) && (K === 'U' || K === 'S')) {
            e.preventDefault(); return false;
          }
        }, true);
      })();
    </script>
    <script src="https://not-fl3.github.io/miniquad-samples/mq_js_bundle.js"></script>
    <script>load("edie_runner.wasm");</script>
</body>
</html>

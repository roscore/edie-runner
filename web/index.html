<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>EDIE Runner</title>
    <style>
        html, body, canvas {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0a0a;
            touch-action: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        canvas:focus { outline: none; }
        body { cursor: none; }
    </style>
</head>
<body oncontextmenu="return false;" onselectstart="return false;" ondragstart="return false;">
    <canvas id="glcanvas" tabindex="1"></canvas>
    <script>
      (function () {
        // Casual-scraper deterrent. Does not stop a determined reverser.
        document.addEventListener('contextmenu', function (e) { e.preventDefault(); }, true);
        document.addEventListener('selectstart', function (e) { e.preventDefault(); }, true);
        document.addEventListener('dragstart', function (e) { e.preventDefault(); }, true);
        document.addEventListener('copy', function (e) { e.preventDefault(); }, true);
        document.addEventListener('keydown', function (e) {
          // Block F12, Ctrl+Shift+I/J/C, Ctrl+U (view source), Ctrl+S (save page)
          var k = e.key || '';
          var K = k.toUpperCase();
          if (k === 'F12') { e.preventDefault(); return false; }
          if ((e.ctrlKey || e.metaKey) && e.shiftKey && (K === 'I' || K === 'J' || K === 'C')) {
            e.preventDefault(); return false;
          }
          if ((e.ctrlKey || e.metaKey) && (K === 'U' || K === 'S')) {
            e.preventDefault(); return false;
          }
        }, true);
      })();
    </script>
    <script src="https://not-fl3.github.io/miniquad-samples/mq_js_bundle.js"></script>
    <!-- Must come after mq_js_bundle (so miniquad_add_plugin exists) and
         before load() (so the plugin is registered when the wasm is
         instantiated). -->
    <script src="edie_plugin.js?v=043"></script>
    <script>
      // Proactively resume the AudioContext on first user interaction so
      // sounds actually play on mobile Safari / Chrome autoplay policy.
      (function () {
        function kick() {
          try {
            var Ctx = window.AudioContext || window.webkitAudioContext;
            if (!Ctx) return;
            if (!window.__edie_audio_ctx) {
              window.__edie_audio_ctx = new Ctx();
            }
            var ctx = window.__edie_audio_ctx;
            if (ctx && ctx.state === 'suspended') ctx.resume();
          } catch (e) {}
        }
        ['touchstart', 'touchend', 'mousedown', 'keydown'].forEach(function (ev) {
          document.addEventListener(ev, kick, { passive: true });
        });
      })();
    </script>
    <script>load("edie_runner.wasm");</script>
</body>
</html>
